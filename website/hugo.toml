baseURL = "https://tau-biggz.pages.dev/"
languageCode = "en-us"
title = "Tau"
enableRobotsTXT = true
publishDir = "public"

[markup.goldmark.renderer]
  unsafe = true

[markup.goldmark.parser]
  wrapStandAloneImageWithinParagraph = false

[markup.highlight]
  noClasses = false
  style = "monokai"

[params]
  description = "An educational Python project for learning how coding agents are built."
  githubUrl = "https://github.com/biggs-100/tau-biggz"
  editRepoUrl = "https://github.com/biggs-100/tau-biggz/edit/main/website/content"

[outputs]
  home = ["HTML", "RSS"]

[module]
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "data"
    target = "data"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "archetypes"
    target = "archetypes"
  [[module.mounts]]
    source = "../release-notes"
    target = "data/release-notes"
