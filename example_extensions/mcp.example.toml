# MCP server configuration for Tau
#
# Add servers here to expose their tools to the Tau agent.
# Protocol: Model Context Protocol (JSON-RPC 2.0)

[[servers]]
name = "filesystem"
transport = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "."]
